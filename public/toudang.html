<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中考投档模拟演示系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --warm-white: #FFFBF4;
            --charcoal: #43382D;
            --charcoal-light: #5A4F44;
            --charcoal-muted: #8A7E73;
            --pop-yellow: #FFD54F;
            --pop-orange: #FF5722;
            --pop-cyan: #00E5FF;
            --pop-blue: #2962FF;
            --border-w: 3px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: var(--charcoal);
            font-family: 'Noto Sans SC', 'PingFang SC', system-ui, sans-serif;
            color: var(--charcoal);
        }

        /* ════════════ 整体布局 ════════════ */
        #app-root {
            width: 100%; height: 100%;
            background: var(--warm-white);
            display: flex; flex-direction: column;
        }

        /* ── 1. 顶部标题栏 ── */
        #header-bar {
            height: 72px; flex-shrink: 0;
            background: var(--charcoal);
            display: flex; align-items: center;
            padding: 0 24px;
            border-bottom: 4px solid var(--pop-yellow);
        }
        #header-bar h1 {
            font-size: 1.6rem; font-weight: 900; color: #fff;
            letter-spacing: 0.08em;
        }
        #header-bar h1 span { color: var(--pop-yellow); }

        .stat-strip {
            display: flex; gap: 32px; margin-left: auto;
        }
        .stat-item {
            display: flex; align-items: baseline; gap: 8px; color: #fff;
        }
        .stat-item label { font-size: 0.85rem; font-weight: 700; opacity: 0.7; }
        .stat-item b {
            font-size: 1.6rem; font-weight: 900; color: var(--pop-yellow);
            min-width: 28px; text-align: right;
        }
        .stat-item b.ok { color: #4CAF50; }
        .stat-item b.fail { color: var(--pop-orange); }

        /* ── 进入全屏按钮 ── */
        #fullscreen-btn {
            margin-left: 24px; padding: 6px 14px;
            background: transparent; border: 2px solid rgba(255,255,255,0.3);
            color: #fff; font-size: 0.75rem; font-weight: 700;
            cursor: pointer; letter-spacing: 0.05em;
            transition: all 0.15s;
        }
        #fullscreen-btn:hover { border-color: var(--pop-yellow); color: var(--pop-yellow); }

        /* ── 2. 学校名额区 ── */
        #school-section {
            flex-shrink: 0;
            border-bottom: var(--border-w) solid var(--charcoal);
            background: #fff;
        }
        .section-tag {
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 20px;
            background: var(--charcoal); color: #fff;
            font-weight: 900; font-size: 0.85rem;
        }
        .section-tag .hint { font-weight: 700; font-size: 0.8rem; color: var(--pop-yellow); }

        #school-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 8px; padding: 10px 12px;
        }

        /* 学校卡片 */
        .school-card {
            border: var(--border-w) solid var(--charcoal);
            background: #fff;
            box-shadow: 3px 3px 0 var(--charcoal);
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .school-card h4 {
            margin: 0; padding: 4px 8px;
            background: var(--charcoal); color: #fff;
            text-align: center; font-size: 0.95rem; font-weight: 900;
            letter-spacing: 0.05em;
        }
        .school-card-body { padding: 6px 8px; flex: 1; display: flex; flex-direction: column; gap: 4px; }

        .quota-row {
            display: flex; align-items: center; gap: 6px;
        }
        .quota-label {
            font-weight: 900; font-size: 0.75rem; color: var(--charcoal-muted);
            width: 18px; flex-shrink: 0;
        }
        .slots { display: flex; gap: 3px; }

        .slot {
            width: 52px; height: 28px;
            border: 2px solid var(--charcoal);
            background: #f5f0ea;
            font-size: 0.7rem; font-weight: 900;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
        }
        .slot.tz { border-color: var(--charcoal); background: #f5f0ea; }
        .slot.tj { border-color: var(--pop-orange); background: #fff5f0; border-style: dashed; }
        .slot.filled-tz { background: var(--pop-yellow); color: var(--charcoal); border-color: var(--charcoal); }
        .slot.filled-tj { background: #FFCCBC; color: var(--charcoal); border-color: var(--pop-orange); border-style: solid; }

        .cut-line {
            font-weight: 900; font-size: 0.65rem; color: var(--pop-orange);
            text-align: right; min-height: 14px; padding-right: 2px;
        }

        /* 学校晃动动画 */
        @keyframes card-shake {
            0%, 100% { transform: translateX(0); }
            15% { transform: translateX(-6px) rotate(-1deg); }
            30% { transform: translateX(5px) rotate(0.5deg); }
            45% { transform: translateX(-4px) rotate(-0.5deg); }
            60% { transform: translateX(3px) rotate(0.3deg); }
            75% { transform: translateX(-2px); }
        }
        .school-card.shake {
            animation: card-shake 0.45s ease-out;
            box-shadow: 3px 3px 0 var(--pop-orange);
        }

        /* ── 3. 主体区域：考生表 + 日志 ── */
        #main-area {
            flex: 1; display: grid;
            grid-template-columns: 1fr 220px;
            overflow: hidden;
            min-height: 0;
        }

        .panel {
            display: flex; flex-direction: column;
            overflow: hidden;
            border-right: var(--border-w) solid var(--charcoal);
        }
        .panel:last-child { border-right: none; }
        .panel-head {
            padding: 8px 16px;
            background: var(--charcoal); color: #fff;
            font-weight: 900; font-size: 0.9rem;
            flex-shrink: 0;
        }
        .panel-body {
            flex: 1; overflow-y: auto; background: #fff;
            min-height: 0;
        }

        /* 考生表格 */
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        thead { position: sticky; top: 0; z-index: 100; }
        th {
            background: var(--pop-yellow); color: var(--charcoal);
            border: 2px solid var(--charcoal);
            padding: 8px 4px; font-size: 0.8rem; font-weight: 900;
            text-align: center;
        }
        td {
            border: 1px solid #e8e2da;
            border-bottom: 1.5px solid #d5cec5;
            padding: 7px 4px; text-align: center;
            font-weight: 700; font-size: 0.82rem;
            color: var(--charcoal);
            transition: background 0.2s;
        }

        .c-rank { width: 52px; }
        .c-name { width: 52px; }
        .c-score { width: 44px; font-weight: 900; }
        .c-type { width: 44px; font-size: 0.7rem; }
        .c-vol { font-size: 0.75rem; color: var(--charcoal-muted); }
        .c-result { width: 72px; font-weight: 900; color: var(--charcoal-muted); }

        /* 行状态 */
        tr.active-row {
            background: #FFF8E1 !important;
            outline: 3px solid var(--pop-yellow);
            outline-offset: -1px;
            position: relative; z-index: 50;
        }
        tr.active-row td { font-weight: 900; }

        tr.done-row { opacity: 0.35; }
        tr.done-row td { background: #f9f6f2; }

        /* 当前检索的志愿单元格高亮 */
        td.vol-checking {
            background: var(--pop-yellow) !important;
            color: var(--charcoal) !important;
            font-weight: 900 !important;
            font-size: 0.82rem !important;
            position: relative;
        }
        td.vol-hit {
            background: #C8E6C9 !important;
            color: #2E7D32 !important;
        }
        td.vol-miss {
            background: #FFCDD2 !important;
            color: #C62828 !important;
            text-decoration: line-through;
        }

        /* 日志 */
        #log-list { padding: 4px 0; }
        #log-list p {
            margin: 0; padding: 5px 12px;
            border-bottom: 1px solid #f0ebe4;
            font-family: 'Noto Sans SC', monospace;
            font-size: 0.7rem; font-weight: 700;
            color: var(--charcoal-light);
            line-height: 1.4;
        }
        #log-list p:nth-child(odd) { background: #fdfaf6; }

        /* ── 4. 底部控制栏 ── */
        #control-bar {
            height: 52px; flex-shrink: 0;
            background: var(--charcoal);
            border-top: var(--border-w) solid var(--charcoal);
            display: flex; align-items: center; justify-content: center;
            gap: 16px; padding: 0 20px;
        }

        .ctl-btn {
            padding: 8px 28px; font-size: 1rem; font-weight: 900;
            border: var(--border-w) solid var(--charcoal);
            cursor: pointer; transition: all 0.1s;
            user-select: none; display: inline-flex; align-items: center; gap: 8px;
        }
        .ctl-btn:active { transform: translate(2px, 2px); box-shadow: none !important; }

        .btn-step {
            background: var(--pop-yellow); color: var(--charcoal);
            box-shadow: 3px 3px 0 rgba(0,0,0,0.5);
        }
        .btn-step:hover { box-shadow: 5px 5px 0 rgba(0,0,0,0.6); transform: translate(-1px, -1px); }

        .btn-fast {
            background: #fff; color: var(--charcoal);
            box-shadow: 3px 3px 0 rgba(0,0,0,0.5);
        }
        .btn-fast:hover { background: #f5f0ea; }

        .btn-reset {
            background: var(--pop-orange); color: #fff;
            box-shadow: 3px 3px 0 rgba(0,0,0,0.5);
            font-size: 0.85rem;
        }

        .ctl-btn.off { opacity: 0.25; pointer-events: none; cursor: not-allowed; }

        /* ── 5. 弹窗 ── */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(67,56,45,0.92); display: flex; justify-content: center; align-items: center;
            z-index: 99999; visibility: hidden; opacity: 0;
            transition: opacity 0.2s;
        }
        #modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-card {
            background: #fff; padding: 40px 48px;
            border: 4px solid var(--charcoal);
            box-shadow: 8px 8px 0 var(--charcoal);
            text-align: center; max-width: 520px;
        }
        .modal-card h2 {
            background: var(--charcoal); color: #fff;
            padding: 8px 20px; margin: -40px -48px 24px -48px;
            font-size: 1.1rem; font-weight: 900;
        }
        .modal-card h2.warn { background: var(--pop-orange); }
        .modal-card p { font-size: 1.2rem; font-weight: 900; margin-bottom: 28px; color: var(--charcoal); line-height: 1.6; }
        .modal-card .btn-modal {
            padding: 10px 32px; background: var(--pop-yellow);
            border: var(--border-w) solid var(--charcoal);
            box-shadow: 3px 3px 0 var(--charcoal);
            font-weight: 900; font-size: 0.95rem; cursor: pointer;
        }
        .modal-card .btn-modal:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0 var(--charcoal); }

        /* ── 6. 飞行名片动画 ── */
        .flyer {
            position: fixed; z-index: 50000;
            background: var(--pop-yellow);
            border: var(--border-w) solid var(--charcoal);
            box-shadow: 3px 3px 0 var(--charcoal);
            font-weight: 900; padding: 4px 14px; font-size: 0.9rem;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* ── 7. Logo ── */
        #sys-logo {
            position: absolute; bottom: 58px; right: 12px;
            width: 56px; border: 2px solid var(--charcoal);
            background: #fff; padding: 3px; z-index: 9000;
            box-shadow: 2px 2px 0 var(--charcoal);
        }
    </style>
</head>

<body>
    <div id="app-root">
        <!-- 1. 顶部标题栏 -->
        <div id="header-bar">
            <h1>中考投档模拟<span>演示系统</span></h1>
            <div class="stat-strip">
                <div class="stat-item"><label>考生</label><b id="v-total">0</b></div>
                <div class="stat-item"><label>学校</label><b>10</b></div>
                <div class="stat-item"><label>已录取</label><b id="v-ok" class="ok">0</b></div>
                <div class="stat-item"><label>滑档</label><b id="v-fail" class="fail">0</b></div>
            </div>
            <button id="fullscreen-btn" onclick="toggleFS()">进入全屏 (F)</button>
        </div>

        <!-- 2. 学校名额区 -->
        <div id="school-section">
            <div class="section-tag">
                <span>🏫 实时招生名额池</span>
                <span class="hint" id="status-hint">准备就绪，请按空格开始</span>
            </div>
            <div id="school-grid"></div>
        </div>

        <!-- 3. 主体区域 -->
        <div id="main-area">
            <div class="panel">
                <div class="panel-head">📝 考生志愿清单</div>
                <div class="panel-body" id="stu-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th class="c-rank">位次</th><th class="c-name">姓名</th>
                                <th class="c-score">分数</th><th class="c-type">身份</th>
                                <th>A</th><th>B</th><th>C</th><th>D</th>
                                <th>E</th><th>F</th><th>G</th><th>H</th>
                                <th class="c-result">结果</th>
                            </tr>
                        </thead>
                        <tbody id="stu-body"></tbody>
                    </table>
                </div>
            </div>
            <div class="panel" style="border-right:none;">
                <div class="panel-head">📜 实时投档日志</div>
                <div class="panel-body" id="log-scroll">
                    <div id="log-list"></div>
                </div>
            </div>
        </div>

        <!-- 4. 底部控制栏 -->
        <div id="control-bar">
            <div id="ui-next" class="ctl-btn btn-step">▶ 下一步 (空格)</div>
            <div id="ui-fast" class="ctl-btn btn-fast off">⏩ 快速投档 (15人)</div>
            <div id="ui-reset" class="ctl-btn btn-reset">🔄 重置模拟</div>
        </div>

        <!-- 5. 弹窗 -->
        <div id="modal-overlay">
            <div class="modal-card">
                <h2 id="modal-t">提示</h2>
                <p id="modal-b"></p>
                <div class="btn-modal" id="modal-close">我明白了 (空格)</div>
            </div>
        </div>

        <img src="logo.png" id="sys-logo" onerror="this.style.display='none'">
    </div>

    <script>
        // ═══════════════════════════════════════════
        //  数据与状态
        // ═══════════════════════════════════════════
        const SCHOOLS = ["七中林荫", "九中宁夏", "石室文庙", "七中高新", "九中光华",
                         "石室北湖", "树德外语", "教科附中", "十二中学", "石室成飞"];
        const TZ_QUOTA = 3;  // 统招名额
        const TJ_QUOTA = 1;  // 调剂名额
        const VOL_COUNT = 8; // 志愿数

        let stus = [], schData = {};
        let sI = 0, volIdx = 0;
        let phase = 'idle'; // idle | pick | checking | trying | done
        let okC = 0, failC = 0, logC = 1;
        let busy = false, modalOn = false, isFast = false, resolveM = null;

        // ═══════════════════════════════════════════
        //  初始化
        // ═══════════════════════════════════════════
        function init() {
            stus = [];
            let score = 666;
            const surnames = ["王","李","张","刘","陈","杨","黄","赵","吴","周",
                              "徐","孙","马","朱","胡","郭","何","高","林","罗",
                              "郑","梁","谢","宋","唐","许","韩","冯","邓","曹",
                              "彭","曾","萧","田","董","潘","袁","蔡"];

            for (let i = 0; i < 38; i++) {
                if (i > 0 && i % 5 === 0) score -= 2;
                else if (i > 0) score -= 1;

                let pool = [...SCHOOLS];
                let choices;
                if (i < 8) {
                    // 尖子生优先报名校
                    choices = ["七中林荫", "九中宁夏", "石室文庙",
                               ...pool.sort(() => Math.random() - 0.5).slice(0, 5)];
                } else {
                    choices = pool.sort(() => Math.random() - 0.5).slice(0, VOL_COUNT);
                }
                stus.push({
                    r: i + 1,
                    n: surnames[i % surnames.length] + (i + 1),
                    s: score,
                    t: Math.random() < 0.7 ? '统招' : '调剂',
                    ch: choices
                });
            }

            schData = {};
            SCHOOLS.forEach(n => {
                schData[n] = {
                    tz: 0, tj: 0,
                    tz_slots: [], tj_slots: [],
                    cardEl: null
                };
            });

            sI = 0; volIdx = 0; phase = 'idle';
            okC = 0; failC = 0; logC = 1;
            busy = false; modalOn = false; isFast = false;

            renderSchools();
            renderStudents();
            document.getElementById('log-list').innerHTML = '';
            addLog("系统初始化完成，共 38 名考生，10 所学校。");
            addLog("按空格键开始投档演示。");
            updateStats();
            setHint("准备就绪，请按空格开始");
            document.getElementById('ui-fast').classList.add('off');
        }

        // ═══════════════════════════════════════════
        //  渲染
        // ═══════════════════════════════════════════
        function renderSchools() {
            const grid = document.getElementById('school-grid');
            grid.innerHTML = '';
            SCHOOLS.forEach(name => {
                const s = schData[name];
                const card = document.createElement('div');
                card.className = 'school-card';
                card.id = 'sch-' + name;
                s.cardEl = card;

                let html = `<h4>${name}</h4><div class="school-card-body">`;
                // 统招行：显示 "统 0/3"
                html += `<div class="quota-row">
                    <span class="quota-label">统</span>
                    <span style="font-size:0.65rem;font-weight:900;color:var(--charcoal-muted);width:30px;">${0}/${TZ_QUOTA}</span>
                    <div class="slots" id="tz-${name}"></div>
                </div>`;
                // 调剂行：显示 "调 0/1"
                html += `<div class="quota-row">
                    <span class="quota-label">调</span>
                    <span style="font-size:0.65rem;font-weight:900;color:var(--charcoal-muted);width:30px;">${0}/${TJ_QUOTA}</span>
                    <div class="slots" id="tj-${name}"></div>
                </div>`;
                html += `<div class="cut-line" id="line-${name}"></div>`;
                html += `</div>`;

                card.innerHTML = html;
                grid.appendChild(card);

                // 创建统招格子
                const tzWrap = card.querySelector(`#tz-${name}`);
                s.tz_slots = [];
                for (let i = 0; i < TZ_QUOTA; i++) {
                    const d = document.createElement('div');
                    d.className = 'slot tz';
                    tzWrap.appendChild(d);
                    s.tz_slots.push(d);
                }

                // 创建调剂格子 (只有1个)
                const tjWrap = card.querySelector(`#tj-${name}`);
                s.tj_slots = [];
                for (let i = 0; i < TJ_QUOTA; i++) {
                    const d = document.createElement('div');
                    d.className = 'slot tj';
                    tjWrap.appendChild(d);
                    s.tj_slots.push(d);
                }
            });
        }

        function renderStudents() {
            const tbody = document.getElementById('stu-body');
            tbody.innerHTML = '';
            stus.forEach(s => {
                const tr = document.createElement('tr');
                tr.id = `row-${s.r}`;
                let cells = `<td class="c-rank">${s.r}</td>
                             <td class="c-name">${s.n}</td>
                             <td class="c-score">${s.s}</td>
                             <td class="c-type">${s.t}</td>`;
                for (let i = 0; i < VOL_COUNT; i++) {
                    cells += `<td class="c-vol" id="vol-${s.r}-${i}">${s.ch[i] || ''}</td>`;
                }
                cells += `<td class="c-result" id="res-${s.r}">-</td>`;
                tr.innerHTML = cells;
                tbody.appendChild(tr);
            });
        }

        function updateStats() {
            document.getElementById('v-total').textContent = stus.length;
            document.getElementById('v-ok').textContent = okC;
            document.getElementById('v-fail').textContent = failC;
        }

        function updateSchoolQuotaDisplay(name) {
            const s = schData[name];
            const card = s.cardEl;
            const tzLabel = card.querySelectorAll('.quota-row')[0].querySelector('span:nth-child(2)');
            const tjLabel = card.querySelectorAll('.quota-row')[1].querySelector('span:nth-child(2)');
            tzLabel.textContent = `${s.tz}/${TZ_QUOTA}`;
            tjLabel.textContent = `${s.tj}/${TJ_QUOTA}`;
        }

        function setHint(text) {
            document.getElementById('status-hint').textContent = text;
        }

        // ═══════════════════════════════════════════
        //  日志
        // ═══════════════════════════════════════════
        function addLog(msg) {
            const p = document.createElement('p');
            p.textContent = `[${logC++}] ${msg}`;
            const list = document.getElementById('log-list');
            list.appendChild(p);
            document.getElementById('log-scroll').scrollTo({ top: 999999, behavior: 'smooth' });
        }

        // ═══════════════════════════════════════════
        //  弹窗
        // ═══════════════════════════════════════════
        async function showModal(title, body, isWarn) {
            return new Promise(r => {
                const tEl = document.getElementById('modal-t');
                tEl.textContent = title;
                tEl.className = isWarn ? 'warn' : '';
                document.getElementById('modal-b').textContent = body;
                document.getElementById('modal-overlay').classList.add('active');
                modalOn = true;
                resolveM = r;
            });
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('active');
            modalOn = false;
            if (resolveM) { resolveM(); resolveM = null; }
        }

        // ═══════════════════════════════════════════
        //  学校晃动动画
        // ═══════════════════════════════════════════
        function shakeSchool(name) {
            return new Promise(r => {
                const card = schData[name].cardEl;
                card.classList.add('shake');
                card.addEventListener('animationend', () => {
                    card.classList.remove('shake');
                    r();
                }, { once: true });
            });
        }

        // ═══════════════════════════════════════════
        //  飞行动画
        // ═══════════════════════════════════════════
        function flyToSlot(fromEl, toEl, studentName) {
            return new Promise(r => {
                const fly = document.createElement('div');
                fly.className = 'flyer';
                fly.textContent = studentName;
                document.body.appendChild(fly);

                const sR = fromEl.getBoundingClientRect();
                const eR = toEl.getBoundingClientRect();

                fly.style.left = sR.left + 'px';
                fly.style.top = sR.top + 'px';

                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        fly.style.left = eR.left + 'px';
                        fly.style.top = eR.top + 'px';
                    });
                });

                setTimeout(() => {
                    fly.remove();
                    r();
                }, 550);
            });
        }

        // ═══════════════════════════════════════════
        //  核心投档步骤
        // ═══════════════════════════════════════════
        async function step() {
            if (busy || sI >= stus.length) {
                if (sI >= stus.length && !busy) {
                    setHint("投档完成！");
                    addLog(`投档结束。录取 ${okC} 人，滑档 ${failC} 人。`);
                }
                return;
            }
            busy = true;
            document.getElementById('ui-next').classList.add('off');

            const stu = stus[sI];
            const row = document.getElementById(`row-${stu.r}`);
            const scroll = document.getElementById('stu-scroll');

            if (phase === 'idle' || phase === 'pick') {
                // ── 步骤1：选中考生，高亮行 ──
                document.querySelectorAll('.active-row').forEach(r => r.classList.remove('active-row'));
                // 清除上一个考生的志愿高亮
                document.querySelectorAll('.vol-checking,.vol-hit,.vol-miss').forEach(
                    el => el.classList.remove('vol-checking','vol-hit','vol-miss')
                );
                row.classList.add('active-row');
                row.scrollIntoView({ behavior: 'smooth', block: 'center' });

                addLog(`【位次${stu.r}】${stu.n}（${stu.s}分·${stu.t}）开始检索…`);
                setHint(`正在处理：${stu.n}（${stu.s}分·${stu.t}）`);
                volIdx = 0;
                phase = 'checking';
            }
            else if (phase === 'checking') {
                // ── 步骤2：检查当前志愿 ──
                if (volIdx >= VOL_COUNT) {
                    // 所有志愿用尽 → 滑档
                    row.classList.remove('active-row');
                    row.classList.add('done-row');
                    document.getElementById(`res-${stu.r}`).textContent = '滑档';
                    document.getElementById(`res-${stu.r}`).style.color = 'var(--pop-orange)';
                    failC++;
                    updateStats();
                    addLog(`⚠️ ${stu.n} 全部志愿已满，滑档！`);
                    if (!isFast) {
                        await showModal("⚠️ 滑档警告",
                            `${stu.n}（位次${stu.r}，${stu.s}分）${VOL_COUNT}个志愿全部录满，遗憾滑档。`, true);
                    }
                    sI++; volIdx = 0; phase = 'pick';
                } else {
                    const target = stu.ch[volIdx];
                    const volCell = document.getElementById(`vol-${stu.r}-${volIdx}`);
                    volCell.classList.add('vol-checking');
                    addLog(`  志愿${String.fromCharCode(65+volIdx)}：检索 ${target}…`);
                    phase = 'trying';
                }
            }
            else if (phase === 'trying') {
                // ── 步骤3：尝试投档 ──
                const target = stu.ch[volIdx];
                const sd = schData[target];
                const volCell = document.getElementById(`vol-${stu.r}-${volIdx}`);

                // 判断能否投入
                let slotType = '';
                if (stu.t === '统招' && sd.tz < TZ_QUOTA) {
                    slotType = 'tz';
                } else if (sd.tj < TJ_QUOTA) {
                    slotType = 'tj';
                }

                if (slotType) {
                    // ✅ 投档成功
                    volCell.classList.remove('vol-checking');
                    volCell.classList.add('vol-hit');

                    const slotIdx = sd[slotType];
                    const slotEl = sd[slotType + '_slots'][slotIdx];

                    // 飞行动画
                    await flyToSlot(volCell, slotEl, stu.n);

                    // 填充格子
                    slotEl.classList.add('filled-' + slotType);
                    slotEl.textContent = stu.n;
                    sd[slotType]++;
                    updateSchoolQuotaDisplay(target);

                    // 检查是否产生分数线
                    const isFull = (slotType === 'tz' && sd.tz === TZ_QUOTA) ||
                                   (slotType === 'tj' && sd.tj === TJ_QUOTA);
                    if (isFull) {
                        const lineLabel = slotType === 'tz' ? '统招' : '调剂';
                        document.getElementById(`line-${target}`).textContent =
                            `${lineLabel}线：${stu.s}分`;
                        addLog(`📊 ${target} ${lineLabel}名额已满 → 分数线：${stu.s}分`);
                        if (!isFast) {
                            await showModal("📊 分数线产生",
                                `${target}【${lineLabel}】名额已满，产生分数线：${stu.s}分。`, false);
                        }
                    }

                    // 标记录取
                    row.classList.remove('active-row');
                    row.classList.add('done-row');
                    const resEl = document.getElementById(`res-${stu.r}`);
                    resEl.textContent = target;
                    resEl.style.color = '#2E7D32';
                    okC++;
                    updateStats();
                    addLog(`✅ ${stu.n} → 录取至 ${target}（${slotType === 'tz' ? '统招' : '调剂'}）`);

                    sI++; volIdx = 0; phase = 'pick';

                    // 处理了3个以上考生后开放快速投档
                    if (sI >= 3) {
                        document.getElementById('ui-fast').classList.remove('off');
                    }
                } else {
                    // ❌ 名额已满，晃动 + 标记
                    volCell.classList.remove('vol-checking');
                    volCell.classList.add('vol-miss');

                    addLog(`  ✗ ${target} 名额已满`);

                    // 学校卡片晃动
                    if (!isFast) {
                        await shakeSchool(target);
                    }

                    volIdx++;
                    phase = 'checking';
                }
            }

            busy = false;
            if (!modalOn) {
                document.getElementById('ui-next').classList.remove('off');
            }
        }

        // ═══════════════════════════════════════════
        //  快速投档
        // ═══════════════════════════════════════════
        async function runFast() {
            isFast = true;
            document.getElementById('ui-fast').classList.add('off');
            document.getElementById('ui-next').classList.add('off');
            setHint("⏩ 快速投档中…");

            const end = Math.min(sI + 15, stus.length);
            while (sI < end) {
                await step();
                await new Promise(r => setTimeout(r, 15));
            }

            isFast = false;
            document.getElementById('ui-next').classList.remove('off');
            if (sI < stus.length) {
                document.getElementById('ui-fast').classList.remove('off');
            }
            setHint(sI < stus.length ? `快速投档完成，当前位次 ${sI + 1}` : '投档完成！');
        }

        // ═══════════════════════════════════════════
        //  全屏
        // ═══════════════════════════════════════════
        function toggleFS() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen();
            }
        }

        // ═══════════════════════════════════════════
        //  事件
        // ═══════════════════════════════════════════
        function act(e) {
            if (e && e.code === 'Space') e.preventDefault();
            if (modalOn) { closeModal(); }
            else { step(); }
        }

        window.onkeydown = (e) => {
            if (e.code === 'Space' || e.code === 'Enter' || e.code === 'PageDown') act(e);
            if (e.key === 'f' || e.key === 'F') toggleFS();
        };

        document.onclick = (e) => {
            const id = e.target.id;
            if (id === 'ui-next' || id === 'modal-close') act();
            else if (id === 'ui-fast') runFast();
            else if (id === 'ui-reset') location.reload();
        };

        window.onload = init;
    </script>
</body>

</html>
